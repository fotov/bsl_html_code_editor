<!DOCTYPE html>
<html>

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .editor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 40px;
      height: 100%;
      padding-top: 8px;
      padding-bottom: 8px;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
      font: 14px/1.5 Consolas, Monaco, monospace;
      color: #888;
      text-align: right;
      box-sizing: border-box;
    }

    #lines div {
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    #hl,
    #code {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 8px 8px 8px 48px;
      font: 14px/1.5 Consolas, Monaco, monospace;
      overflow: auto;
      white-space: pre;
      box-sizing: border-box;
      tab-size: 4;
    }

    textarea {
      background: transparent;
      color: rgba(0, 0, 0, 0.01);
      z-index: 2;
      resize: none;
      border: 0;
      outline: 0;
      caret-color: #000;
    }

    pre {
      z-index: 1;
      pointer-events: none;
      color: #333;
    }

    /* 1小 泻谢褞褔械胁褘械 褋谢芯胁邪 */
    .keyword {
      color: #f00;
      font-weight: bold;
    }

    .identifier {
      color: #00f;
    }

    /* 小褌褉芯泻懈 */
    .string {
      color: #a31515;
    }

    /* 袣芯屑屑械薪褌邪褉懈懈 */
    .comment {
      color: #008000;
    }

    /* 袩褉械锌褉芯褑械褋褋芯褉 */
    .preproc {
      color: #963200;
    }

    /* 袗薪薪芯褌邪褑懈懈 */
    .annotation {
      color: #963200;
    }

    /* 效懈褋谢邪 */
    .number {
      color: #000;
    }

    /* 小褌褉芯泻懈 */
    .string {
      color: #aaa;
    }

    /* 袛邪褌褘 */
    .date {
      color: #000;
    }

    .operator {
      color: #f00;
    }

    .error {
      color: #f80;
    }

    /* 袛懈褉械泻褌懈胁褘 锌褉械锌褉芯褑械褋褋芯褉邪 */
    .dir {
      color: #800080;
    }

    /* 袣芯薪褌械泻褋褌薪邪褟 锌芯写褋泻邪蟹泻邪 */
    #tooltip {
      position: absolute;
      display: none;
      background: #ffffe1;
      border: 1px solid #ccc;
      padding: 5px 10px;
      font: 12px Consolas, Monaco, monospace;
      z-index: 100;
      max-width: 300px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    #tooltip h4 {
      margin: 0 0 5px 0;
      color: #00f;
    }

    #tooltip p {
      margin: 0;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="editor">
    <div id="lines"></div>
    <pre id="hl"></pre>
    <textarea id="code" spellcheck="false" autocomplete="off" wrap="off"
      placeholder="袧邪褔薪懈褌械 胁胁芯写懈褌褜 泻芯写..."></textarea>
    <div id="tooltip"></div>
  </div>

  <script>
    var ta = document.getElementById('code');
    var hl = document.getElementById('hl');
    var lines = document.getElementById('lines');
    var tooltip = document.getElementById('tooltip');
    const keywords = "械褋谢懈 if 褌芯谐写邪 then 懈薪邪褔械械褋谢懈 elsif 懈薪邪褔械 else 泻芯薪械褑械褋谢懈 endif 写谢褟 for 泻邪卸写芯谐芯 each 懈蟹 in 锌芯 to 锌芯泻邪 while 褑懈泻谢 do 泻芯薪械褑褑懈泻谢邪 enddo 卸写邪褌褜 await 锌褉芯褑械写褍褉邪 procedure 褎褍薪泻褑懈褟 function 泻芯薪械褑锌褉芯褑械写褍褉褘 endprocedure 泻芯薪械褑褎褍薪泻褑懈懈 endfunction 锌械褉械屑 var 锌械褉械泄褌懈 goto 胁芯蟹胁褉邪褌 return 锌褉芯写芯谢卸懈褌褜 continue 锌褉械褉胁邪褌褜 break 懈 and 懈谢懈 or 薪械 not 锌芯锌褘褌泻邪 try 懈褋泻谢褞褔械薪懈械 except 胁褘蟹胁邪褌褜懈褋泻谢褞褔械薪懈械 raise 泻芯薪械褑锌芯锌褘褌泻懈 endtry 薪芯胁褘泄 new 胁褘锌芯谢薪懈褌褜 execute 邪褋懈薪褏 懈褋褌懈薪邪 谢芯卸褜 null 袧械芯锌褉械写械谢械薪芯".split(" ")

    // 小谢芯胁邪褉褜 锌芯写褋泻邪蟹芯泻 写谢褟 泻谢褞褔械胁褘褏 褋谢芯胁
    var keywordHints = {
      '械褋谢懈': { title: '械褋谢懈', desc: '袨锌械褉邪褌芯褉 褍褋谢芯胁薪芯谐芯 锌械褉械褏芯写邪' },
      '懈薪邪褔械': { title: '懈薪邪褔械', desc: '袗谢褜褌械褉薪邪褌懈胁薪邪褟 胁械褌胁褜 褍褋谢芯胁懈褟' },
      '懈薪邪褔械械褋谢懈': { title: '懈薪邪褔械械褋谢懈', desc: '袛芯锌芯谢薪懈褌械谢褜薪芯械 褍褋谢芯胁懈械' },
      '写谢褟': { title: '写谢褟 ... 懈蟹', desc: '笑懈泻谢 锌芯 泻芯谢谢械泻褑懈懈' },
      '锌芯泻邪': { title: '锌芯泻邪', desc: '笑懈泻谢 褋 褍褋谢芯胁懈械屑' },
      '锌褉芯褑械写褍褉邪': { title: '锌褉芯褑械写褍褉邪', desc: '袨斜褗褟胁谢械薪懈械 锌褉芯褑械写褍褉褘' },
      '褎褍薪泻褑懈褟': { title: '褎褍薪泻褑懈褟', desc: '袨斜褗褟胁谢械薪懈械 褎褍薪泻褑懈懈' },
      '胁芯蟹胁褉邪褌': { title: '胁芯蟹胁褉邪褌', desc: '袙芯蟹胁褉邪褌 蟹薪邪褔械薪懈褟 懈蟹 褎褍薪泻褑懈懈' },
      '锌械褉械屑': { title: '锌械褉械屑', desc: '袨斜褗褟胁谢械薪懈械 锌械褉械屑械薪薪芯泄' },
      '蟹薪邪褔': { title: '蟹薪邪褔', desc: '袩邪褉邪屑械褌褉 锌芯 蟹薪邪褔械薪懈褞' },
      '褝泻褋锌芯褉褌': { title: '褝泻褋锌芯褉褌', desc: '协泻褋锌芯褉褌懈褉褍械屑褘泄 屑械褌芯写/锌械褉械屑械薪薪邪褟' },
      '锌芯锌褘褌泻邪': { title: '锌芯锌褘褌泻邪', desc: '袨斜褉邪斜芯褌泻邪 懈褋泻谢褞褔械薪懈泄' },
      '薪芯胁褘泄': { title: '薪芯胁褘泄', desc: '小芯蟹写邪薪懈械 芯斜褗械泻褌邪' }
    };

    // 袪械谐褍谢褟褉薪褘械 胁褘褉邪卸械薪懈褟 写谢褟 锌芯写褋胁械褌泻懈
    var strRe = /"[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*'/g;
    var comRe = /\/\/.*$/gm;
    var numRe = /\b\d+(\.\d+)?\b/g;
    var dirRe = /^&.*/gm;

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function endLexemExecute(element, props, endLexem) {
      lexem = element.slice(props.beginLexem, endLexem)
      type = props.lexemType
      if (type == "identifier" && keywords.includes(lexem.toLowerCase())) {
        type = "keyword"
      } else if (type == "numberWithDot") {
        type = "number"
      }

      props.beginLexem = endLexem
      if (type == undefined || lexem.length == 0){
          result = lexem
        } else {
          result = '<span class="' + type + '">' + lexem + '</span>'
        }
      props.lexemType = undefined
      return result
    }

    function highlightCode(code) {

      var result = [];

      // 小薪邪褔邪谢邪 褝泻褉邪薪懈褉褍械屑 HTML
      lines = code.split("\n")
      lines.forEach((element, index) => {
        props = {
          lexemType: undefined,
          beginLexem: 0
        }
        let i = 0
        while (i < element.length) {
          symbol = element[i]
          symbolNext = element[i + 1]
          if (props.lexemType == undefined) {
            if (symbol == "/" && symbolNext == "/") {
              props.lexemType = "comment"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == "#") {
              props.lexemType = "preproc"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == "&") {
              props.lexemType = "annotation"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == '"' || symbol == '|') {
              props.lexemType = 'string'
            } else if (symbol == "'") {
              props.lexemType = 'date'
            } else if ("邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟abcdefghijklmnopqrstuvwxyz_".includes(symbol.toLowerCase())) {
              props.lexemType = 'identifier'
            } else if ("0123456789".includes(symbol)) {
              props.lexemType = 'number'
            } else if (" \t".includes(symbol)) {
              props.lexemType = 'whitespace'
            } else if ("()[]+-*/%<>=~;:.,'".includes(symbol)) {
              props.lexemType = 'operator'
              result.push(endLexemExecute(element, props, i + 1))
            } else {
              props.lexemType = 'error'
              result.push(endLexemExecute(element, props, i + 1))
            }
          } else if (props.lexemType == 'string' && symbol == '"') {
            if (symbolNext == '"') {
              i++
            } else {
              result.push(endLexemExecute(element, props, i + 1))
            }
          } else if (props.lexemType == 'date' && symbol == "'") {
            result.push(endLexemExecute(element, props, i + 1))
          } else if (props.lexemType == 'identifier'
            && ! "邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟abcdefghijklmnopqrstuvwxyz_0123456789".includes(symbol.toLowerCase())) {
            result.push(endLexemExecute(element, props, i))
            continue
          } else if (props.lexemType == 'number') {
            if (symbol == '.') {
              props.lexemType = 'numberWithDot'
            } else if (! "0123456789".includes(symbol)) {
              result.push(endLexemExecute(element, props, i))
              continue
            }
          } else if (props.lexemType == 'numberWithDot' && ! "0123456789".includes(symbol)) {
            result.push(endLexemExecute(element, props, i))
            continue
          } else if (props.lexemType == 'whitespace' && !(" \t".includes(symbol))) {
            result.push(endLexemExecute(element, props, i))
            continue
          }
          i++
        }
      result.push(endLexemExecute(element, props, i))
      result.push('\n')
      });
      return result.join('');
    }

    function render() {
      var v = ta.value;
      hl.innerHTML = highlightCode(v);

      var lineCount = v.split('\n').length;
      var html = '';
      for (var i = 1; i <= lineCount; i++) {
        html += '<div>' + i + '</div>';
      }
      lines.innerHTML = html;
    }

    function syncscroll() {
      hl.scrollTop = ta.scrollTop;
      hl.scrollLeft = ta.scrollLeft;
      lines.scrollTop = ta.scrollTop;
    }

    function showTooltip(keyword) {
      var hint = keywordHints[keyword.toLowerCase()];
      if (hint) {
        tooltip.innerHTML = '<h4>' + hint.title + '</h4><p>' + hint.desc + '</p>';
        tooltip.style.display = 'block';

        // 袩芯蟹懈褑懈芯薪懈褉褍械屑 锌芯写褋泻邪蟹泻褍 褉褟写芯屑 褋 泻褍褉褋芯褉芯屑
        var coords = getCaretCoordinates(ta, ta.selectionStart);
        var rect = ta.getBoundingClientRect();
        tooltip.style.left = (rect.left + coords.left + 48) + 'px';
        tooltip.style.top = (rect.top + coords.top + 8) + 'px';
      }
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    // 校锌褉芯褖械薪薪邪褟 褎褍薪泻褑懈褟 写谢褟 锌芯谢褍褔械薪懈褟 泻芯芯褉写懈薪邪褌 泻褍褉褋芯褉邪
    function getCaretCoordinates(element, position) {
      var text = element.value.substring(0, position);
      var lines = text.split('\n');
      var lineHeight = 21; // 14px * 1.5
      var y = (lines.length - 1) * lineHeight;

      // 袩褉懈斜谢懈蟹懈褌械谢褜薪邪褟 褕懈褉懈薪邪 褋懈屑胁芯谢邪
      var charWidth = 8.4; // 写谢褟 Consolas 14px
      var lastLine = lines[lines.length - 1];
      var x = lastLine.length * charWidth;

      return { left: x, top: y };
    }

    ta.addEventListener('input', function () {
      render();
      syncscroll();
    });

    ta.addEventListener('scroll', syncscroll);

    ta.addEventListener('keydown', function (e) {
      // Tab
      if (e.keyCode === 9) {
        e.preventDefault();
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '\t' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        render();
      }

      // Ctrl+Space 写谢褟 泻芯薪褌械泻褋褌薪芯泄 锌芯写褋泻邪蟹泻懈
      if (e.ctrlKey && e.keyCode === 32) {
        e.preventDefault();
        var text = ta.value;
        var pos = ta.selectionStart;

        // 袧邪褏芯写懈屑 褋谢芯胁芯 锌械褉械写 泻褍褉褋芯褉芯屑
        var wordStart = pos;
        while (wordStart > 0 && /[邪-褟袗-携a-zA-Z0-9_]/.test(text[wordStart - 1])) {
          wordStart--;
        }

        var word = text.substring(wordStart, pos);
        if (word) {
          showTooltip(word);
        }
      }
    });

    ta.addEventListener('click', hideTooltip);
    ta.addEventListener('blur', hideTooltip);

    // 袠薪懈褑懈邪谢懈蟹邪褑懈褟
    render();
  </script>
</body>

</html>
