<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .editor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 40px;
      height: 100%;
      padding-top: 8px;
      padding-bottom: 8px;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
      font: 14px/1.5 Consolas, Monaco, monospace;
      color: #888;
      text-align: right;
      box-sizing: border-box;
    }

    #lines div {
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    #hl,
    #code {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 8px 8px 8px 48px;
      font: 14px/1.5 Consolas, Monaco, monospace;
      overflow: auto;
      white-space: pre;
      box-sizing: border-box;
      tab-size: 4;
    }

    textarea {
      background: transparent;
      color: rgba(0, 0, 0, 0.01);
      z-index: 2;
      resize: none;
      border: 0;
      outline: 0;
      caret-color: #000;
    }

    pre {
      z-index: 1;
      pointer-events: none;
      color: #333;
    }

    /* 1–° –Ї–ї—О—З–µ–≤—Л–µ —Б–ї–Њ–≤–∞ */
    .keyword {
      color: #f00;
      font-weight: bold;
    }

    .identifier {
      color: #00f;
    }

    /* –Ъ–Њ–Љ–Љ–µ–љ—В–∞—А–Є–Є */
    .comment {
      color: #008000;
    }

    /* –Я—А–µ–њ—А–Њ—Ж–µ—Б—Б–Њ—А */
    .preproc {
      color: #963200;
    }

    /* –Р–љ–љ–Њ—В–∞—Ж–Є–Є */
    .annotation {
      color: #963200;
    }

    /* –І–Є—Б–ї–∞ */
    .number {
      color: #000;
    }

    /* –°—В—А–Њ–Ї–Є */
    .string {
      color: #aaa;
    }

    /* –Ф–∞—В—Л */
    .date {
      color: #000;
    }

    .operator {
      color: #f00;
    }

    .error {
      color: #f80;
    }

    /* –Ф–Є—А–µ–Ї—В–Є–≤—Л –њ—А–µ–њ—А–Њ—Ж–µ—Б—Б–Њ—А–∞ */
    .dir {
      color: #800080;
    }

    /* –Ъ–Њ–љ—В–µ–Ї—Б—В–љ–∞—П –њ–Њ–і—Б–Ї–∞–Ј–Ї–∞ */
    #tooltip {
      position: absolute;
      display: none;
      background: #ffffe1;
      border: 1px solid #ccc;
      padding: 5px 10px;
      font: 12px Consolas, Monaco, monospace;
      z-index: 100;
      max-width: 300px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    #tooltip h4 {
      margin: 0 0 5px 0;
      color: #00f;
    }

    #tooltip p {
      margin: 0;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="editor">
    <div id="lines"></div>
    <pre id="hl"></pre>
    <textarea id="code" spellcheck="false" autocomplete="off" wrap="off"
      placeholder="–Э–∞—З–љ–Є—В–µ –≤–≤–Њ–і–Є—В—М –Ї–Њ–і..."></textarea>
    <div id="tooltip"></div>
  </div>

  <script>
    var ta = document.getElementById('code');
    var hl = document.getElementById('hl');
    var lines = document.getElementById('lines');
    var tooltip = document.getElementById('tooltip');
    const keywords = "–µ—Б–ї–Є if —В–Њ–≥–і–∞ then –Є–љ–∞—З–µ–µ—Б–ї–Є elsif –Є–љ–∞—З–µ else –Ї–Њ–љ–µ—Ж–µ—Б–ї–Є endif –і–ї—П for –Ї–∞–ґ–і–Њ–≥–Њ each –Є–Ј in –њ–Њ to –њ–Њ–Ї–∞ while —Ж–Є–Ї–ї do –Ї–Њ–љ–µ—Ж—Ж–Є–Ї–ї–∞ enddo –ґ–і–∞—В—М await –њ—А–Њ—Ж–µ–і—Г—А–∞ procedure —Д—Г–љ–Ї—Ж–Є—П function –Ї–Њ–љ–µ—Ж–њ—А–Њ—Ж–µ–і—Г—А—Л endprocedure –Ї–Њ–љ–µ—Ж—Д—Г–љ–Ї—Ж–Є–Є endfunction –њ–µ—А–µ–Љ var –њ–µ—А–µ–є—В–Є goto –≤–Њ–Ј–≤—А–∞—В return –њ—А–Њ–і–Њ–ї–ґ–Є—В—М continue –њ—А–µ—А–≤–∞—В—М break –Є and –Є–ї–Є or –љ–µ not –њ–Њ–њ—Л—В–Ї–∞ try –Є—Б–Ї–ї—О—З–µ–љ–Є–µ except –≤—Л–Ј–≤–∞—В—М–Є—Б–Ї–ї—О—З–µ–љ–Є–µ raise –Ї–Њ–љ–µ—Ж–њ–Њ–њ—Л—В–Ї–Є endtry –љ–Њ–≤—Л–є new –≤—Л–њ–Њ–ї–љ–Є—В—М execute –∞—Б–Є–љ—Е –Є—Б—В–Є–љ–∞ –ї–Њ–ґ—М null –љ–µ–Њ–њ—А–µ–і–µ–ї–µ–љ–Њ".split(" ")

    function endLexemExecute(element, props, endLexem) {
      const lexem = element.slice(props.beginLexem, endLexem)
      var type = props.lexemType
      var result
      if (type == "identifier" && keywords.includes(lexem.toLowerCase())) {
        type = "keyword"
      } else if (type == "numberWithDot") {
        type = "number"
      }

      props.beginLexem = endLexem
      if (type == undefined || lexem.length == 0) {
        result = lexem
      } else {
        result = '<span class="' + type + '">' + lexem + '</span>'
      }
      props.lexemType = undefined
      return result
    }

    function highlightCode(code) {

      var result = [];
      var props = {
        lexemType: undefined,
        beginLexem: 0
      }

      // –°–љ–∞—З–∞–ї–∞ —Н–Ї—А–∞–љ–Є—А—Г–µ–Љ HTML
      code.split("\n").forEach((element, index) => {
        let i = 0
        props.beginLexem = 0
        while (i < element.length) {
          let symbol = element[i]
          let symbolNext = element[i + 1]
          if (props.lexemType == undefined) {
            if (symbol == "/" && symbolNext == "/") {
              props.lexemType = "comment"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == "#") {
              props.lexemType = "preproc"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == "&") {
              props.lexemType = "annotation"
              result.push(endLexemExecute(element, props, element.length))
              break
            } else if (symbol == '"' || symbol == '|') {
              props.lexemType = 'string'
            } else if (symbol == "'") {
              props.lexemType = 'date'
            } else if ("–∞–±–≤–≥–і–µ—С–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—К—Л—М—Н—О—Пabcdefghijklmnopqrstuvwxyz_".includes(symbol.toLowerCase())) {
              props.lexemType = 'identifier'
            } else if ("0123456789".includes(symbol)) {
              props.lexemType = 'number'
            } else if (" \t".includes(symbol)) {
              props.lexemType = 'whitespace'
            } else if ("()[]+-*/%<>=~;:.,'".includes(symbol)) {
              props.lexemType = 'operator'
              result.push(endLexemExecute(element, props, i + 1))
            } else {
              props.lexemType = 'error'
              result.push(endLexemExecute(element, props, i + 1))
            }
          } else if (props.lexemType == 'string' && symbol == '"') {
            if (symbolNext == '"') {
              i++
            } else {
              result.push(endLexemExecute(element, props, i + 1))
            }
          } else if (props.lexemType == 'date' && symbol == "'") {
            result.push(endLexemExecute(element, props, i + 1))
          } else if (props.lexemType == 'identifier'
            && ! "–∞–±–≤–≥–і–µ—С–ґ–Ј–Є–є–Ї–ї–Љ–љ–Њ–њ—А—Б—В—Г—Д—Е—Ж—З—И—Й—К—Л—М—Н—О—Пabcdefghijklmnopqrstuvwxyz_0123456789".includes(symbol.toLowerCase())) {
            result.push(endLexemExecute(element, props, i))
            continue
          } else if (props.lexemType == 'number') {
            if (symbol == '.') {
              props.lexemType = 'numberWithDot'
            } else if (! "0123456789".includes(symbol)) {
              result.push(endLexemExecute(element, props, i))
              continue
            }
          } else if (props.lexemType == 'numberWithDot' && ! "0123456789".includes(symbol)) {
            result.push(endLexemExecute(element, props, i))
            continue
          } else if (props.lexemType == 'whitespace' && !(" \t".includes(symbol))) {
            result.push(endLexemExecute(element, props, i))
            continue
          }
          i++
        }
        result.push(endLexemExecute(element, props, i))
        result.push('\n')
      });
      return result.join('');
    }

    function render() {
      var v = ta.value;
      hl.innerHTML = highlightCode(v);

      var lineCount = v.split('\n').length;
      var html = '';
      for (var i = 1; i <= lineCount; i++) {
        html += '<div>' + i + '</div>';
      }
      lines.innerHTML = html;
    }

    function syncscroll() {
      hl.scrollTop = ta.scrollTop;
      hl.scrollLeft = ta.scrollLeft;
      lines.scrollTop = ta.scrollTop;
    }

    ta.addEventListener('input', function () {
      render();
      syncscroll();
    });

    ta.addEventListener('scroll', syncscroll);

    ta.addEventListener('keydown', function (e) {
      // Tab
      if (e.keyCode === 9) {
        e.preventDefault();
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        
        // –Х—Б–ї–Є –µ—Б—В—М –≤—Л–і–µ–ї–µ–љ–Є–µ
        if (start !== end) {
          var selectedText = ta.value.substring(start, end);
          var lines = selectedText.split('\n');
          
          if (e.shiftKey) {
            // Shift+Tab: —Г–±–Є—А–∞–µ–Љ –Њ—В—Б—В—Г–њ
            lines = lines.map(function(line) {
              if (line.startsWith('\t')) {
                return line.substring(1);
              }
              // –Ґ–∞–Ї–ґ–µ —Г–±–Є—А–∞–µ–Љ –њ—А–Њ–±–µ–ї—М–љ—Л–µ –Њ—В—Б—В—Г–њ—Л (4 –њ—А–Њ–±–µ–ї–∞)
              var spacesToRemove = 0;
              for (var i = 0; i < line.length && i < 4; i++) {
                if (line[i] === ' ') {
                  spacesToRemove++;
                } else {
                  break;
                }
              }
              return line.substring(spacesToRemove);
            });
          } else {
            // Tab: –і–Њ–±–∞–≤–ї—П–µ–Љ –Њ—В—Б—В—Г–њ
            lines = lines.map(function(line) {
              return '\t' + line;
            });
          }
          
          var newSelectedText = lines.join('\n');
          ta.value = ta.value.substring(0, start) + newSelectedText + ta.value.substring(end);
          
          // –Т–Њ—Б—Б—В–∞–љ–∞–≤–ї–Є–≤–∞–µ–Љ –≤—Л–і–µ–ї–µ–љ–Є–µ —Б —Г—З—С—В–Њ–Љ –Є–Ј–Љ–µ–љ–µ–љ–Є–є
          var lengthDiff = newSelectedText.length - selectedText.length;
          ta.selectionStart = start;
          ta.selectionEnd = end + lengthDiff;
        } else {
          // –Э–µ—В –≤—Л–і–µ–ї–µ–љ–Є—П: –њ—А–Њ—Б—В–Њ –≤—Б—В–∞–≤–ї—П–µ–Љ —В–∞–±—Г–ї—П—Ж–Є—О
          document.execCommand("insertText", false, '\t')
        }
        
        render();
      }

      // Enter - –∞–≤—В–Њ–Њ—В—Б—В—Г–њ
      if (e.keyCode === 13) {
        e.preventDefault();
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        
        // –Э–∞—Е–Њ–і–Є–Љ –њ—А–µ–і—Л–і—Г—Й—Г—О —Б—В—А–Њ–Ї—Г
        var textBeforeCursor = ta.value.substring(0, start);
        var lastNewlineIndex = textBeforeCursor.lastIndexOf('\n');
        var previousLine = lastNewlineIndex >= 0 
          ? textBeforeCursor.substring(lastNewlineIndex + 1, start)
          : textBeforeCursor;
        
        // –Я–Њ–і—Б—З–Є—В—Л–≤–∞–µ–Љ –Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ –≤–µ–і—Г—Й–Є—Е —В–∞–±—Г–ї—П—Ж–Є–є
        var indent = '';
        for (var i = 0; i < previousLine.length; i++) {
          if (previousLine[i] === '\t') {
            indent += '\t';
          } else {
            break;
          }
        }
        
        // –Т—Б—В–∞–≤–ї—П–µ–Љ –њ–µ—А–µ–љ–Њ—Б —Б—В—А–Њ–Ї–Є –Є –Њ—В—Б—В—Г–њ —З–µ—А–µ–Ј execCommand –і–ї—П —Б–Њ—Е—А–∞–љ–µ–љ–Є—П –Є—Б—В–Њ—А–Є–Є
        document.execCommand('insertText', false, '\n' + indent);
        
        render();
      }


    });

    // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–∞—Ж–Є—П
    render();
  </script>
</body>

</html>
