<!DOCTYPE html>
<html>

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .editor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 40px;
      height: 100%;
      padding-top: 8px;
      padding-bottom: 8px;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
      font: 14px/1.5 Consolas, Monaco, monospace;
      color: #888;
      text-align: right;
      box-sizing: border-box;
    }

    #lines div {
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    #hl,
    #code {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 8px 8px 8px 48px;
      font: 14px/1.5 Consolas, Monaco, monospace;
      overflow: auto;
      white-space: pre;
      box-sizing: border-box;
      tab-size: 4;
    }

    textarea {
      background: transparent;
      color: rgba(0, 0, 0, 0.01);
      z-index: 2;
      resize: none;
      border: 0;
      outline: 0;
      caret-color: #000;
    }

    pre {
      z-index: 1;
      pointer-events: none;
      color: #333;
    }

    /* 1С ключевые слова */
    .kw {
      color: #00f;
      font-weight: bold;
    }

    /* Строки */
    .str {
      color: #a31515;
    }

    /* Комментарии */
    .com {
      color: #008000;
    }

    /* Числа */
    .num {
      color: #098658;
    }

    /* Директивы препроцессора */
    .dir {
      color: #800080;
    }

    /* Контекстная подсказка */
    #tooltip {
      position: absolute;
      display: none;
      background: #ffffe1;
      border: 1px solid #ccc;
      padding: 5px 10px;
      font: 12px Consolas, Monaco, monospace;
      z-index: 100;
      max-width: 300px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    #tooltip h4 {
      margin: 0 0 5px 0;
      color: #00f;
    }

    #tooltip p {
      margin: 0;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="editor">
    <div id="lines"></div>
    <pre id="hl"></pre>
    <textarea id="code" spellcheck="false" autocomplete="off" wrap="off"
      placeholder="Начните вводить код..."></textarea>
    <div id="tooltip"></div>
  </div>

  <script>
    var ta = document.getElementById('code');
    var hl = document.getElementById('hl');
    var lines = document.getElementById('lines');
    var tooltip = document.getElementById('tooltip');

    // Ключевые слова 1С (расширенный список)
    var keywords = [
      'если', 'иначе', 'иначеесли', 'конецесли',
      'для', 'каждого', 'из', 'по', 'цикл', 'конеццикла',
      'пока', 'прервать', 'продолжить',
      'процедура', 'конецпроцедуры',
      'функция', 'конецфункции',
      'возврат', 'перем', 'знач',
      'экспорт', 'и', 'или', 'не',
      'истина', 'ложь', 'нуль',
      'новый', 'выполнить', 'попытка', 'исключение', 'конецпопытки',
      'вызватьисключение', 'наборданных', 'параметр',
      'асинх', 'ожидание'
    ];

    // Словарь подсказок для ключевых слов
    var keywordHints = {
      'если': { title: 'если', desc: 'Оператор условного перехода' },
      'иначе': { title: 'иначе', desc: 'Альтернативная ветвь условия' },
      'иначеесли': { title: 'иначеесли', desc: 'Дополнительное условие' },
      'для': { title: 'для ... из', desc: 'Цикл по коллекции' },
      'пока': { title: 'пока', desc: 'Цикл с условием' },
      'процедура': { title: 'процедура', desc: 'Объявление процедуры' },
      'функция': { title: 'функция', desc: 'Объявление функции' },
      'возврат': { title: 'возврат', desc: 'Возврат значения из функции' },
      'перем': { title: 'перем', desc: 'Объявление переменной' },
      'знач': { title: 'знач', desc: 'Параметр по значению' },
      'экспорт': { title: 'экспорт', desc: 'Экспортируемый метод/переменная' },
      'попытка': { title: 'попытка', desc: 'Обработка исключений' },
      'новый': { title: 'новый', desc: 'Создание объекта' }
    };

    // Регулярные выражения для подсветки
    var kwRe = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');
    var strRe = /"[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*'/g;
    var comRe = /\/\/.*$/gm;
    var numRe = /\b\d+(\.\d+)?\b/g;
    var dirRe = /^&.*/gm;

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function highlightCode(code) {
      // Сначала экранируем HTML
      var result = escapeHtml(code);
      
      // Подсветка строк (заменяем в последнюю очередь, чтобы не затронуть теги)
      var strings = [];
      result = result.replace(strRe, function(match) {
        strings.push('<span class="str">' + match + '</span>');
        return '\x01STR' + (strings.length - 1) + '\x01';
      });

      // Подсветка комментариев
      var comments = [];
      result = result.replace(comRe, function(match) {
        comments.push('<span class="com">' + match + '</span>');
        return '\x01COM' + (comments.length - 1) + '\x01';
      });

      // Подсветка чисел
      var numbers = [];
      result = result.replace(numRe, function(match) {
        numbers.push('<span class="num">' + match + '</span>');
        return '\x01NUM' + (numbers.length - 1) + '\x01';
      });

      // Подсветка директив
      var directives = [];
      result = result.replace(dirRe, function(match) {
        directives.push('<span class="dir">' + match + '</span>');
        return '\x01DIR' + (directives.length - 1) + '\x01';
      });

      // Подсветка ключевых слов
      kwRe.lastIndex = 0;
      result = result.replace(kwRe, '<span class="kw">$1</span>');

      // Восстанавливаем строки
      for (var i = 0; i < strings.length; i++) {
        result = result.replace('\x01STR' + i + '\x01', strings[i]);
      }

      // Восстанавливаем комментарии
      for (var i = 0; i < comments.length; i++) {
        result = result.replace('\x01COM' + i + '\x01', comments[i]);
      }

      // Восстанавливаем числа
      for (var i = 0; i < numbers.length; i++) {
        result = result.replace('\x01NUM' + i + '\x01', numbers[i]);
      }

      // Восстанавливаем директивы
      for (var i = 0; i < directives.length; i++) {
        result = result.replace('\x01DIR' + i + '\x01', directives[i]);
      }

      return result;
    }

    function render() {
      var v = ta.value;
      hl.innerHTML = highlightCode(v);

      var lineCount = v.split('\n').length;
      var html = '';
      for (var i = 1; i <= lineCount; i++) {
        html += '<div>' + i + '</div>';
      }
      lines.innerHTML = html;
    }

    function syncscroll() {
      hl.scrollTop = ta.scrollTop;
      hl.scrollLeft = ta.scrollLeft;
      lines.scrollTop = ta.scrollTop;
    }

    function showTooltip(keyword) {
      var hint = keywordHints[keyword.toLowerCase()];
      if (hint) {
        tooltip.innerHTML = '<h4>' + hint.title + '</h4><p>' + hint.desc + '</p>';
        tooltip.style.display = 'block';
        
        // Позиционируем подсказку рядом с курсором
        var coords = getCaretCoordinates(ta, ta.selectionStart);
        var rect = ta.getBoundingClientRect();
        tooltip.style.left = (rect.left + coords.left + 48) + 'px';
        tooltip.style.top = (rect.top + coords.top + 8) + 'px';
      }
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    // Упрощенная функция для получения координат курсора
    function getCaretCoordinates(element, position) {
      var text = element.value.substring(0, position);
      var lines = text.split('\n');
      var lineHeight = 21; // 14px * 1.5
      var y = (lines.length - 1) * lineHeight;
      
      // Приблизительная ширина символа
      var charWidth = 8.4; // для Consolas 14px
      var lastLine = lines[lines.length - 1];
      var x = lastLine.length * charWidth;
      
      return { left: x, top: y };
    }

    ta.addEventListener('input', function () {
      render();
      syncscroll();
    });

    ta.addEventListener('scroll', syncscroll);

    ta.addEventListener('keydown', function (e) {
      // Tab
      if (e.keyCode === 9) {
        e.preventDefault();
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '\t' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        render();
      }
      
      // Ctrl+Space для контекстной подсказки
      if (e.ctrlKey && e.keyCode === 32) {
        e.preventDefault();
        var text = ta.value;
        var pos = ta.selectionStart;
        
        // Находим слово перед курсором
        var wordStart = pos;
        while (wordStart > 0 && /[а-яА-Яa-zA-Z0-9_]/.test(text[wordStart - 1])) {
          wordStart--;
        }
        
        var word = text.substring(wordStart, pos);
        if (word) {
          showTooltip(word);
        }
      }
    });

    ta.addEventListener('click', hideTooltip);
    ta.addEventListener('blur', hideTooltip);

    // Инициализация
    render();
  </script>
</body>

</html>
